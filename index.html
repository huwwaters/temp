<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginated Search Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
        <h2 class="text-3xl font-extrabold text-white mb-6 tracking-tight">Product Search Engine</h2>
        
        <div class="relative">
            <input 
                type="text" 
                id="search-box" 
                placeholder="Start typing to search (min. 3 characters)..." 
                autocomplete="off"
                class="w-full px-5 py-4 text-lg bg-slate-900 border border-slate-600 rounded-lg shadow-inner text-white placeholder-slate-400 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
            >
            
            <div id="status" class="text-sm text-sky-400 mt-3 min-h-[20px] font-medium tracking-wide"></div>
            
            <ul 
                id="results" 
                class="mt-4 border border-slate-700 rounded-lg divide-y divide-slate-700 max-h-96 overflow-y-auto hidden bg-slate-900 shadow-xl"
            ></ul>

            <div 
                id="pagination" 
                class="mt-5 flex items-center justify-between border-t border-slate-700 pt-5 hidden"
            >
                <button 
                    id="prev-btn" 
                    disabled
                    class="px-5 py-2.5 text-sm font-semibold text-slate-200 bg-slate-700 border border-slate-600 rounded-md hover:bg-slate-600 hover:text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed transition duration-150"
                >
                    Previous
                </button>
                <span id="page-num" class="text-sm font-bold text-slate-400 tracking-wider">Page 1</span>
                <button 
                    id="next-btn" 
                    disabled
                    class="px-5 py-2.5 text-sm font-semibold text-slate-200 bg-slate-700 border border-slate-600 rounded-md hover:bg-slate-600 hover:text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed transition duration-150"
                >
                    Next
                </button>
            </div>
        </div>
    </div>

    <script>
        const searchBox = document.getElementById('search-box');
        const resultsList = document.getElementById('results');
        const statusMsg = document.getElementById('status');
        const paginationDiv = document.getElementById('pagination');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageNumLabel = document.getElementById('page-num');

        let currentPage = 1;

        searchBox.addEventListener('input', function() {
            currentPage = 1; 
            fetchResults();
        });

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                fetchResults();
            }
        });

        nextBtn.addEventListener('click', () => {
            currentPage++;
            fetchResults();
        });

        function fetchResults() {
            const query = searchBox.value.trim();

            if (query.length < 3) {
                resultsList.innerHTML = '';
                resultsList.classList.add('hidden');
                paginationDiv.classList.add('hidden');
                statusMsg.textContent = query.length > 0 ? `Keep typing... (${3 - query.length} more characters needed)` : '';
                statusMsg.className = "text-sm text-slate-400 mt-3 min-h-[20px] font-medium tracking-wide";
                return;
            }

            statusMsg.textContent = 'Searching database...';
            statusMsg.className = "text-sm text-blue-400 mt-3 min-h-[20px] font-medium tracking-wide animate-pulse";

            fetch(`/search?q=${encodeURIComponent(query)}&page=${currentPage}`)
                .then(response => response.json())
                .then(data => {
                    resultsList.innerHTML = '';
                    
                    if (data.results && data.results.length > 0) {
                        data.results.forEach(item => {
                            const li = document.createElement('li');
                            li.textContent = item;
                            // Uses bright blue backgrounds during item hover selection
                            li.className = "px-5 py-3.5 text-slate-200 hover:bg-blue-600 hover:text-white transition duration-100 cursor-pointer";
                            resultsList.appendChild(li);
                        });
                        
                        resultsList.classList.remove('hidden');
                        paginationDiv.classList.remove('hidden');
                        statusMsg.textContent = '';
                    } else {
                        resultsList.classList.add('hidden');
                        paginationDiv.classList.add('hidden');
                        statusMsg.className = "text-sm text-slate-400 mt-3 min-h-[20px] font-medium tracking-wide";
                        statusMsg.textContent = currentPage > 1 ? 'No further results found.' : 'No results found.';
                    }
                    
                    // Update pagination UI numbers & buttons
                    pageNumLabel.textContent = `Page ${data.page || currentPage}`;
                    prevBtn.disabled = (currentPage === 1);
                    nextBtn.disabled = !data.has_more;
                })
                .catch(error => {
                    console.error('Error:', error);
                    statusMsg.className = "text-sm text-red-400 mt-3 min-h-[20px] font-medium tracking-wide";
                    statusMsg.textContent = 'Error loading results from server.';
                });
        }
    </script>
</body>
</html>
